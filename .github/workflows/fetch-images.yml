name: Fetch BGG Images

on:
  push:
    branches: [master]
    paths:
      - 'games.json'
      - '.github/workflows/fetch-images.yml'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch BGG data & download images
        run: node fetch-bgg.js

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/ games-data.json
          git diff --staged --quiet || git commit -m "chore: update BGG images and game data [skip ci]"
          git push
